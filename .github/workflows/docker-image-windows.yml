name: Docker Image Manual Build & Push (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows-amd64:
    runs-on: windows-2025
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        shell: pwsh
        run: mvn clean install -DskipTests

      - name: Extract project version
        id: version
        shell: pwsh
        run: |
          $version = mvn -q -DforceStdout help:evaluate "-Dexpression=project.version"
          $version = $version | Select-Object -Last 1
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Verify JAR exists
        shell: pwsh
        run: |
          $jar = "engine/target/testlum-${{ steps.version.outputs.version }}.jar"
          if (-not (Test-Path $jar)) {
            Write-Error "Missing $jar"
            Get-ChildItem -Recurse engine/target
            exit 1
          }

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: testlum-jar
          path: engine/target/testlum-${{ steps.version.outputs.version }}.jar

      - name: Set up Docker Engine
        uses: docker/setup-docker-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker
        shell: pwsh
        run: |
          docker version
          docker info

      - name: Build and push Windows AMD64 image
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $imageVersion = "ghcr.io/testlumframework/testlum:$version-windows-amd64"
          $imageLatest = "ghcr.io/testlumframework/testlum:latest-windows-amd64"

          docker build -f Dockerfile.windows --build-arg APP_VERSION=$version -t $imageVersion -t $imageLatest .
          docker push $imageVersion
          docker push $imageLatest

  build-windows-arm64:
    runs-on: windows-11-arm
    needs: build-windows-amd64
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: testlum-jar
          path: build-artifacts

      - name: Prepare JAR for Docker build context
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path engine/target | Out-Null
          $version = "${{ needs.build-windows-amd64.outputs.version }}"
          $jar = "build-artifacts/testlum-$version.jar"
          if (-not (Test-Path $jar)) {
            Write-Error "Missing $jar"
            Get-ChildItem -Recurse build-artifacts
            exit 1
          }
          Copy-Item $jar "engine/target/testlum-$version.jar"

      - name: Check Docker availability on ARM runner
        shell: pwsh
        run: |
          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Error "Docker CLI is not available on windows-11-arm runner. Use a self-hosted ARM runner with Docker installed."
            exit 1
          }
          docker version
          docker info

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Windows ARM64 image
        shell: pwsh
        run: |
          $version = "${{ needs.build-windows-amd64.outputs.version }}"
          $imageVersion = "ghcr.io/testlumframework/testlum:$version-windows-arm64"
          $imageLatest = "ghcr.io/testlumframework/testlum:latest-windows-arm64"

          docker build -f Dockerfile.windows --build-arg APP_VERSION=$version -t $imageVersion -t $imageLatest .
          docker push $imageVersion
          docker push $imageLatest
