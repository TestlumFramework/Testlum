name: Docker Image Manual Build & Push (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2025
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        shell: pwsh
        run: mvn -B clean install -DskipTests

      - name: Extract project version
        id: version
        shell: pwsh
        run: |
          $version = mvn -q -DforceStdout help:evaluate "-Dexpression=project.version"
          $version = $version | Select-Object -Last 1
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Verify JAR exists
        shell: pwsh
        run: |
          $jar = "engine/target/testlum-${{ steps.version.outputs.version }}.jar"
          if (-not (Test-Path $jar)) {
            Write-Error "Missing $jar"
            Get-ChildItem -Recurse engine/target
            exit 1
          }

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Windows image
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $imageVersion = "ghcr.io/testlumframework/testlum:$version-windows-amd64"
          $imageLatest = "ghcr.io/testlumframework/testlum:latest-windows-amd64"

          docker build -f Dockerfile.windows --build-arg APP_VERSION=$version -t $imageVersion -t $imageLatest .
          docker push $imageVersion
          docker push $imageLatest
