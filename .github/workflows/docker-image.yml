name: Docker Image Manual Build & Push

on:
  workflow_dispatch:

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract project version
        id: version
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          VERSION=$(echo "$VERSION" | tail -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-jar:
    runs-on: ubuntu-latest
    needs: prepare-version
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: mvn clean install -DskipTests

      - name: Verify JAR exists
        run: |
          JAR="engine/target/testlum-${{ needs.prepare-version.outputs.version }}.jar"
          test -f "$JAR" || { echo "Missing $JAR"; ls -R engine/target || true; exit 1; }

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: testlum-jar
          path: engine/target/testlum-${{ needs.prepare-version.outputs.version }}.jar

  build-linux:
    runs-on: ubuntu-latest
    needs: prepare-version
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Linux image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            APP_VERSION=${{ needs.prepare-version.outputs.version }}
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/testlumframework/testlum:${{ needs.prepare-version.outputs.version }}-linux
            ghcr.io/testlumframework/testlum:latest-linux
          provenance: false
          sbom: false

  build-windows-amd64:
    runs-on: windows-2025
    needs: [prepare-version, build-jar]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: testlum-jar
          path: build-artifacts

      - name: Prepare JAR for Docker build context
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path engine/target | Out-Null
          $version = "${{ needs.prepare-version.outputs.version }}"
          $jar = "build-artifacts/testlum-$version.jar"
          if (-not (Test-Path $jar)) {
            Write-Error "Missing $jar"
            Get-ChildItem -Recurse build-artifacts
            exit 1
          }
          Copy-Item $jar "engine/target/testlum-$version.jar"

      - name: Set up Docker Engine
        uses: docker/setup-docker-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Windows AMD64 image
        shell: pwsh
        run: |
          $version = "${{ needs.prepare-version.outputs.version }}"
          $imageVersion = "ghcr.io/testlumframework/testlum:$version-windows-amd64"
          $imageLatest = "ghcr.io/testlumframework/testlum:latest-windows-amd64"

          docker build -f Dockerfile.windows --build-arg APP_VERSION=$version -t $imageVersion -t $imageLatest .
          docker push $imageVersion
          docker push $imageLatest

  publish-manifest:
    runs-on: ubuntu-latest
    needs: [prepare-version, build-linux, build-windows-amd64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish unified version and latest tags
        run: |
          VERSION='${{ needs.prepare-version.outputs.version }}'

          docker buildx imagetools create \
            -t ghcr.io/testlumframework/testlum:${VERSION} \
            ghcr.io/testlumframework/testlum:${VERSION}-linux \
            ghcr.io/testlumframework/testlum:${VERSION}-windows-amd64

          docker buildx imagetools create \
            -t ghcr.io/testlumframework/testlum:latest \
            ghcr.io/testlumframework/testlum:latest-linux \
            ghcr.io/testlumframework/testlum:latest-windows-amd64

      - name: Inspect unified latest manifest
        run: docker buildx imagetools inspect ghcr.io/testlumframework/testlum:latest
